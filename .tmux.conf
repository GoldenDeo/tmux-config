# ─── Core ───────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*:RGB"
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#S · #W"
setw -g mode-keys vi

# ─── Prefix: Ctrl+a (screen-style; avoids macOS Ctrl+Space input-source conflict) ─
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Splits with intuitive keys, inherit cwd ────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ─── Vim-style pane nav and resize ──────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# ─── Reload config without restart ──────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ─── Yank to system clipboard in copy-mode ──────────────────────────────
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ─── Lake palette (matches Story Tail design tokens) ────────────────────
# lake900=#0d1117  lake800=#161b22  lake700=#21262d  lake600=#30363d
# lake400=#6e7681  lake300=#8b949e  lake100=#b1bac4  lake50=#cdd9e5
# teal500=#2d7d9a  teal400=#3d8fa6  amber500=#c97a3a  coral500=#9b4a4a

# Pane borders — active pane is unmissable
set -g pane-border-style "fg=#30363d"
set -g pane-active-border-style "fg=#3d8fa6,bold"
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[fg=#3d8fa6#,bold],#[fg=#6e7681]}#P · #{pane_current_command} "

# Status bar
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#161b22,fg=#b1bac4"
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[fg=#0d1117,bg=#3d8fa6,bold] #S #[fg=#3d8fa6,bg=#161b22,nobold] "
set -g status-right "#[fg=#30363d,bg=#161b22]#[fg=#8b949e,bg=#30363d] %a %d %b #[fg=#3d8fa6,bg=#30363d]#[fg=#0d1117,bg=#3d8fa6,bold] %H:%M "

setw -g window-status-separator ""
setw -g window-status-format "#[fg=#6e7681,bg=#161b22] #I:#W "
setw -g window-status-current-format "#[fg=#161b22,bg=#30363d]#[fg=#3d8fa6,bg=#30363d,bold] #I:#W #[fg=#30363d,bg=#161b22]"

# Message line (Prefix : prompts, errors)
set -g message-style "fg=#cdd9e5,bg=#21262d"
set -g message-command-style "fg=#cdd9e5,bg=#21262d"

# Copy-mode highlight
setw -g mode-style "fg=#0d1117,bg=#c97a3a,bold"

# ─── TPM plugins ────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'

# Continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Keep TPM init line at the very bottom
run '~/.tmux/plugins/tpm/tpm'
